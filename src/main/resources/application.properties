# ================= Mogo Gourmet API =================
mogo.api.url=https://api.mogogourmet.com.br
mogo.api.token=${MOGO_API_TOKEN:your_mock_token}

# ================= ClickUp API =================
clickup.api.url=https://api.clickup.com/api/v2
clickup.api.token=${CLICKUP_API_TOKEN}
clickup.list_id.inventory=${CLICKUP_INVENTORY_LIST_ID}
clickup.list_id.tasks=${CLICKUP_TASKS_LIST_ID}

# ================= Ollama (IA Local) =================
ollama.api.url=http://localhost:11434
ollama.model=llama3.3

# ================= PostgreSQL =================
spring.datasource.url=jdbc:postgresql://localhost:5432/cafe_forecast
spring.datasource.username=postgres
spring.datasource.password=3441
spring.datasource.driver-class-name=org.postgresql.Driver

# ================= JPA / Hibernate =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================= JWT Configuration =================
jwt.secret=mySuperSecretKeyForJWTTokenGenerationThatMustBeLongEnoughForHS256
jwt.expiration=86400000

# ================= Groq API =================
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile
